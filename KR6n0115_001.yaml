body:
  text: 陳那菩薩造三藏法師玄奘譯蕅益道人智旭解觀之一字是能觀之智即第六識與正解等諸善心所藉正教正理以為定量令於所觀不倒不錯也所緣緣三字是所觀之境即心王心所之相分也蓋凡心王心所皆藉四緣而生一親因緣即是種子二等無間緣即前念現行三所緣緣即各識自所變之相分四增上緣即六根及餘一切心心所等今於四緣之中獨論觀所緣緣又於一切所緣緣中獨約前五識言者蓋現量五塵境界凡外小乘愚惑不了妄計以為心外實法所以生取捨想起貪瞋癡今用正理比度較量既非極微又非和合則心外更無一法為所緣緣而所緣緣惟是自識所變相分明矣既惟自識所變相分又何容生取捨想起貪瞋癡哉此則破我法二執之神劍斷煩惱妄想之利斧也論字如常可解論中先敘極微和合二執是似能立門次明彼俱非理以下是真能破門後明內色如外現等申於正義是真能立門此皆由陳那菩薩以根本智證真現量故能以後得智立真比量開曉後人名之為論吾人讀此論者藉此正教為量二六時中恆於五塵如理觀察了知無心外之極微亦無心外之和合相一切所見所聞所覺所觸惟是自識所變相分即此為識所緣即此助生於識是名大乘唯心識觀初門論文分二初破外執二申正義初彼外執三初正破二計二破諸轉計三結非外色初又三初總敘破二別奪破三結違理今初諸有欲令眼等五識以外色作所緣緣者或執極微許有實體能生識故或執和合以識生時帶彼相故二俱非理所以者何言諸外道及小乘等不達心外無法故有妄自立論欲令眼等五識不以自所變相為所緣緣而以外五塵色法作所緣緣者或執心外極微為所緣緣妄許微塵為有實體能生識故或執心外極微和合之物為所緣緣以識生時帶彼相故此總敘二種妄執也二俱非理句以理總奪所以者何句徵起下文二別奪破二初破極微二破和合初中二初立頌二釋成今初極微於五識設緣非所緣彼相識無故猶如眼根等量云彼所執極微是有法其於五識設許為緣決定非所緣宗因云彼極微相於五識上無可得故同喻如眼根等蓋五根能發五識是增上緣五識不帶五根相起非所緣緣也姑無論識外本無極微可得今縱許微塵實有而能生識亦止可為增上緣耳豈可執為所緣緣哉二釋成又二初正明所緣緣義二釋頌責其義缺今初所緣緣者謂能緣之識帶彼相起故名所緣及有實體令能緣之識托彼而生故復名緣此明所緣緣須具所慮所托二義二義隨缺則不可立為所緣緣也二釋頌責其義缺色等極微設有實體能生五識容有緣義然非所緣如眼根等於眼等識無彼相故如是極微於眼等識無所緣義謂彼所執色等極微姑無論其元無實法設縱許有實體能生五識容有緣義然非所緣喻如眼等五根於眼識等不帶彼相起故如是極微亦爾於眼等識無所緣義云何可名所緣緣耶二破和合二初立頌二釋成今初和合於五識設所緣非緣彼體實無故猶如第二月量云彼所執和合是有法其於五識設許為所緣決定非緣宗因云彼和合物但有假相而體實無故同喻如第二月蓋第二月揑目妄見其體實無但是意識非量境界不是現量性境不為生眼識緣也既無緣義則所緣義亦豈得成特姑縱之云耳二釋成色等和合於眼識等有彼相故設作所緣然無緣義如眼錯亂見第二月彼無實體不能生故如是和合於眼等識無有緣義謂彼所執心外色等和合之相於眼識等似有帶彼相起義故設使可作所緣然無能為生識之緣之義譬如因眼錯亂見第二月彼第二月原無實體不能生于現量眼識但是意識非量境故如是所執和合之相亦如二月一般於眼等識無有緣義既無緣義又豈可為所緣緣耶三結違理故外二事於所緣緣互闕一支俱不應理謂彼所執心外極微及和合相之二事於所緣緣之義各闕一支故俱不應理也初正破二計竟二破諸轉計二初破極微和集相二破極微和集位初中二初敘計二破斥今初有執色等各有多相於中一分是現量境故諸極微相資各有一和集相此相實有各能發生似已相識故與五識作所緣緣謂有妄執色等諸境各有多種和合差別假相於中一分本極微相是現量境故諸極微相資遂亦各有一和集相此和集相不離極微故是實有而此實有之和集相各能發生似於己相之識此則雙具帶彼相起見托彼生二義故與五識作所緣緣也二破斥此亦非理所以者何和集如堅等設於眼等識是緣非所緣許極微相故量云彼所執極微上之和集相是有法於眼等識設緣非所緣宗因云以彼許和集相不離極微相故同喻如堅濕等譬如不離極微而有堅濕等性設許堅等實有或可於眼等識是增上緣而決非是所緣以眼等識不帶堅濕等相起故今和集相亦爾設許實有仍不離極微相故如何得有所緣義耶如堅等相雖縱許是實有於眼等識容有為緣助生之義而非所緣以眼等識上無彼堅等相故今色等極微上各各諸和集相理亦應爾彼于堅等相及和集相俱執為仍是極微上之相故重釋頌義如文可知二破極微和集位二初敘計二破斥今初執眼等識能緣極微諸和集相復有別生因上已破極微上之和集相設有緣義而非所緣今又轉成一執謂極微上諸和集相復有別別形相生起得為眼等識之所緣故云執眼等識能緣極微諸和集相復有別生也然此諸和集相既仍不離極微極微不別則覺相亦應無別覺相既別則極微亦應有別今謂覺相無別既不可謂極微有別亦不可則所執不益謬乎故下即約此二義破之二破斥又二初約覺應無別破二約極微差別破今初瓶甌等覺相彼執應無別非形別故別形別非實故謂緣瓶甌等之覺相若依彼執則應更無差別何以故瓶之與甌同是極微上之和集相故則緣此和集相何容作瓶甌差別覺哉非可謂瓶甌等之形別而覺相亦別以形別唯在假法上有非實極微有差別故極微無別則覺亦應無別矣瓶甌等物大小等者能成極微多少同故緣彼覺相應無差別若謂彼形物相別故覺相別者理亦不然項等別形惟在瓶等假法上有非極微故此重釋頌義也謂若執識緣極微和集而生則凡瓶甌等物其大小若平等者彼能成之極微多少決定同故即緣彼二物之覺相亦應更無差別且如有一箇瓶重一斤許乃用若干極微和集而成復有一甌亦重斤許亦用若干極微和集而成則能成此二物之極微多少既同將能緣此二物之覺相亦應無別矣若謂彼形物相別故而令覺相別者理亦不然以項腹等種種別形惟在瓶甌等假法上有非可謂極微有差別故既極微多少和集無別則覺相亦應無別覺相既有差別則不以極微和集為所緣明矣二約極微差別破彼不應執極微亦有差別形相所以者何上已發明極微和集無別覺應無別恐彼轉計極微亦有差別故令覺相差別乃徵起而破斥之極微量等故形別惟在假析彼至極微彼覺定捨故非瓶甌等能成極微有形量別捨微圓相故知別形在假非實又形別物析至極微彼覺定捨非青等物析至極微彼覺可捨由此形別惟世俗有非如青等亦在實物先舉頌次釋成也釋云非可謂瓶甌等之能成極微亦有形量差別而遂捨其微圓之相故知項腹等種種別形但在假法非在實法此中且權指極微為實法也又形別物假使析至極微則彼形別之覺決定即捨譬如一瓶一甌同時打得粉碎則決不起瓶甌之覺亦決不可分別誰是瓶之極微誰是甌之極微矣若青黃等物縱使析至極微青仍覺青黃仍覺黃非可謂彼覺亦捨也由此形別惟世俗有非如青等亦在實物世俗有即四俗諦中之假名無實諦所攝不能為緣生眼等識但是第六意識所緣而已實物即四俗諦中之隨事差別諦亦四真諦中之體用顯現諦今青黃等色正是眼識自所變之相分名為性境故云亦在實物然亦在二字意顯青等名言便非實物青等體相是識所變乃為實物耳二破諸轉計竟三結非外色是故五識所緣緣體非外色等其理極成既不可以極微為所緣緣又不可以和合為所緣緣既不可以極微之和集相為所緣緣又不可以極微之和集位為所緣緣則所執心外色等豈有可作所緣緣體者哉唯識論云許有極微尚致此失況無識外真實極微此之謂也以上即是真能破竟是故結云其理極成二申正義二初正成立內所緣緣是有二兼成立增上緣依不無三結惟內境初中二初正立二釋疑今初彼所緣緣豈全不有非全不有若爾云何此設為問答以徵起也問曰若如上破極微和合俱不可以作所緣緣則彼五識之所緣緣豈全不有耶答曰非全不有又設問曰若爾外色既非所緣緣體則汝所謂有所緣緣畢竟云何內色如外現為識所緣緣許彼相在識及能生識故此先舉頌答也內色者謂識所變之相分色如外現者謂本不在心外由衆生不了心體從來無外妄認四大為自身相妄認心在色身之內故於自識所現之色有似乎在外也即此似如外現之內色為眼等識之所緣緣許彼相在識有所緣義及能生識復有緣義故也外境雖無而有內色似外境現為所緣緣許眼等識帶彼相故及從彼生具二義故此重釋頌義也外境雖無謂從來心外無法也似外境現謂隨情假說為外也帶彼相即是具所緣義從彼生即是復具緣義二義無闕故是真能立矣二釋疑又二初疑問二答釋今初此內境相既不離識如何俱起能作識緣既是俱起便無先後云何能作生識之緣故疑問也二答釋決定相隨故俱時亦作緣或前為後緣引彼功能故境相與識定相隨故雖俱時起亦作識緣因明者說若此與彼有無相隨雖俱時生而亦得有因果相故或前識相為後識緣引本識中生似自果功能令起不違理故亦先舉頌次釋成也內心境相與能緣之識決定相隨故雖俱時而起亦得與識作緣如因明論師所說若此法與彼法有則俱有無則俱無有無相隨者雖復俱時而生而此有故彼有則此即為因相彼即為果相故此釋上二句頌義也又或前識之相分得為後識之生緣以五識現行相分熏於本識則能引彼本識中生似自果之功能令起亦不違正理故此釋下二句頌義也生似自果功能指五淨色根能生現行五識故名所生之五識為似目果名能生之五根以為功能初正成立內所緣緣是有竟二兼成立增上緣依不無二初設問舉頌二以論釋成今初若五識生惟緣內色如何亦說眼等為緣此引契經眼色為緣生於眼識等義而設問也識上色功能名五根應理功能與境色無始互為因此先以頌略答也謂第八識上色之功能名為五根應於正理即此功能與彼相分境色無始以來常互為因互相熏生也二以論釋成二初釋前二句次釋後二句今初以能發識比知有根此但功能非外所造故本識上五色功能名眼等根亦不違理功能發識理無別故在識在餘雖不可說而外諸法理非有故定應許此在識非餘五淨色根非是現量所得以其能發識故比量而知有根此但第八識相分上之功能非是心外別有八法所造故本識上五種淨色功能名為眼等五根亦不違理惟此功能能發五識理無心外之別法故然五根既是比知不是現量故在識在餘俱不可說而心外諸法理非有故定應許此功能決在識而非餘也次釋後二句又二初正釋二辨一異今初此根功能與前境色從無始際展轉為因謂此功能至成熟位生現識上五內境色此內境色復能引起異熟識上五根功能言此第八識上五根功能與前所說五識相分境色從無始際展轉為因何以知之謂此本識中所有功能至於成熟位時則能生現行五識上之五種內相分境色即此五識內相分境色復能熏於本識引起異熟識上五根功能故云無始互為因也二辨一異根境二色與識一異或非一異隨樂應說五根淨色及本質境色是第八識之相分前五識所緣緣境色是前五識之相分相見不離自證體故故可說一所緣不是能緣亦可說異又相見差別故非一不離自證故非異又因果體用亦非一異故既達諸法本無實性便可隨樂應說也二兼成立增上緣依不無竟三結唯內境如是諸識唯內境相為所緣緣理善成立諸識且指前五識言內境相即指各識自所變現之相分言既五識不緣外境則第六識至七八識皆無心外所緣緣境明矣故云理善成立即所謂真能立也
